name: Publish to npm

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to publish from
        required: false
        default: main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref || github.ref_name }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run check:version-sync
      - run: npm run check
      - run: npm pack --dry-run
      - run: npm publish
