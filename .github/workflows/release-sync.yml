name: Release Sync

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to sync, for example v1.0.0
        required: false

jobs:
  sync-marketplace:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      MARKETPLACE_REPO: sendbird/codex-plugins
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.release_tag || github.ref_name }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Checkout marketplace repo
        uses: actions/checkout@v6
        with:
          repository: sendbird/codex-plugins
          path: marketplace
          token: ${{ secrets.CODEX_PLUGINS_GH_TOKEN }}
          persist-credentials: true
      - name: Sync marketplace contents
        run: node scripts/sync-marketplace-release.mjs marketplace
      - name: Commit, push, and open marketplace PR
        id: sync_pr
        env:
          GH_TOKEN: ${{ secrets.CODEX_PLUGINS_GH_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="release-sync/${RELEASE_TAG//\//-}"
          TITLE="Sync cc release ${RELEASE_TAG}"
          BODY=$'Automated sync for '"${RELEASE_TAG}"$' from sendbird/cc-plugin-codex.\n\nSource release: https://github.com/sendbird/cc-plugin-codex/releases/tag/'"${RELEASE_TAG}"
          cd marketplace
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add .
          if git diff --cached --quiet; then
            echo "No marketplace changes to push."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "$TITLE"
          git push --force --set-upstream origin "$BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          PR_NUMBER="$(gh pr list --repo "$MARKETPLACE_REPO" --state open --head "$BRANCH" --base main --json number --jq '.[0].number // empty')"
          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" --repo "$MARKETPLACE_REPO" --title "$TITLE" --body "$BODY"
          else
            gh pr create --repo "$MARKETPLACE_REPO" --base main --head "$BRANCH" --title "$TITLE" --body "$BODY" >/dev/null
            PR_NUMBER="$(gh pr view "$BRANCH" --repo "$MARKETPLACE_REPO" --json number --jq .number)"
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
      - name: Merge marketplace PR
        if: steps.sync_pr.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.CODEX_PLUGINS_GH_TOKEN }}
        run: |
          gh pr checks "${{ steps.sync_pr.outputs.pr_number }}" \
            --repo "$MARKETPLACE_REPO" \
            --watch \
            --interval 10

          gh pr merge "${{ steps.sync_pr.outputs.pr_number }}" \
            --repo "$MARKETPLACE_REPO" \
            --squash \
            --delete-branch \
            --admin
